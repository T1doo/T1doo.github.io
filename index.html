---
layout: default
---

<div class="container">
  <!-- Hero -->
  <section class="hero fade-in">
    <div class="hero__avatar">&#x1F9D1;&#x200D;&#x1F4BB;</div>
    <h1 class="hero__name">T1doo</h1>
    <p class="hero__bio">学生 / 研究者 / 终身学习者</p>
    <div class="hero__tags">
      <span class="tag">在读学生</span>
      <span class="tag tag--mint">计算机科学</span>
      <span class="tag tag--blue">技术爱好者</span>
    </div>
  </section>

  <hr class="divider">

  <!-- Quick Links -->
  <section class="section fade-in">
    <h2 class="section__title">&#x1F680; 快捷入口</h2>
    <div class="grid grid--3">
      <a href="{{ '/projects' | relative_url }}" class="card card--link">
        <span class="card__icon">&#x1F4BB;</span>
        <h3 class="card__title">项目</h3>
        <p class="card__desc">查看我的项目作品</p>
      </a>
      <a href="{{ '/notes' | relative_url }}" class="card card--link">
        <span class="card__icon">&#x1F4D3;</span>
        <h3 class="card__title">笔记</h3>
        <p class="card__desc">学习笔记与知识整理</p>
      </a>
      <a href="{{ '/about' | relative_url }}" class="card card--link">
        <span class="card__icon">&#x1F44B;</span>
        <h3 class="card__title">关于我</h3>
        <p class="card__desc">了解更多关于我的信息</p>
      </a>
    </div>
  </section>

  <!-- Recent Timeline -->
  <section class="section fade-in">
    <h2 class="section__title">&#x1F4AC; 最近动态</h2>
    <div class="timeline">
      {% for item in site.data.timeline limit:3 %}
      <div class="timeline__item">
        <div class="timeline__date">{{ item.date }}</div>
        <div class="timeline__title">
          <span class="timeline__icon">{{ item.icon }}</span>{{ item.title }}
        </div>
        <div class="timeline__desc">{{ item.description }}</div>
      </div>
      {% endfor %}
    </div>
    <p style="text-align: center; margin-top: 1rem;">
      <a href="{{ '/timeline' | relative_url }}" style="font-weight: 600;">查看全部动态 &rarr;</a>
    </p>
  </section>
</div>
