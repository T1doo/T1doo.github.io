# Site settings
title: T1doo's Home
description: "学生 / 研究者 / 终身学习者"
url: "https://t1doo.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  notes:
    output: true
    permalink: /notes/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "notes"
    values:
      layout: post

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules

# Plugins
plugins:
  - jekyll-seo-tag
