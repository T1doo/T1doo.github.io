---
layout: default
---

<div class="container">
  <article>
    <div class="page-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        {% if page.date %}<span>{{ page.date | date: "%Y-%m-%d" }}</span>{% endif %}
        {% if page.category %}<span> &middot; {{ page.category }}</span>{% endif %}
        {% if page.tags %}
        <br>
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
        {% endif %}
      </div>
    </div>

    <hr class="divider">

    <div class="post-content fade-in">
      {{ content }}
    </div>
  </article>
</div>
